version: 2

builds:
  - id: preflight
    dir: cli
    main: .
    binary: preflight
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: preflight
    builds: [preflight]
    format: tar.gz
    name_template: "preflight-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: alexandervalencia
    name: preflight
